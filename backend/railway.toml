[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run db:generate && npm run db:push && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "listai-backend"
